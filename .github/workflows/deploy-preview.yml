name: Deploy Preview to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-preview
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN" || (echo "::error::Missing GitHub secret VERCEL_TOKEN" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "::error::Missing GitHub secret VERCEL_ORG_ID" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "::error::Missing GitHub secret VERCEL_PROJECT_ID" && exit 1)

      - name: Pull Vercel Preview Environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Deploy Preview
        id: deploy
        run: |
          url=$(vercel deploy --yes --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Add preview summary
        run: |
          echo "Preview deployment ready:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
