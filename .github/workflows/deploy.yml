name: Deploy Production to Vercel

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN" || (echo "::error::Missing GitHub secret VERCEL_TOKEN" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "::error::Missing GitHub secret VERCEL_ORG_ID" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "::error::Missing GitHub secret VERCEL_PROJECT_ID" && exit 1)

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
