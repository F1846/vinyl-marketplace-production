name: Daily Security Audit (Free)

on:
  schedule:
    - cron: "0 9 * * *"   # Every day at 09:00 UTC
  workflow_dispatch:

# Uses GITHUB_TOKEN only — no extra API key or cost required.
# GitHub Models (gpt-4o) is free for GitHub Actions workflows.
permissions:
  contents: read
  issues: write
  models: read

concurrency:
  group: daily-security-audit-free
  cancel-in-progress: false

jobs:
  audit:
    name: Security Findings Report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        run: |
          npm audit --json > /tmp/npm-audit.json || true
          CRITICAL=$(node -e "const d=require('/tmp/npm-audit.json'); console.log(d.metadata?.vulnerabilities?.critical ?? 0)")
          HIGH=$(node -e "const d=require('/tmp/npm-audit.json'); console.log(d.metadata?.vulnerabilities?.high ?? 0)")
          MODERATE=$(node -e "const d=require('/tmp/npm-audit.json'); console.log(d.metadata?.vulnerabilities?.moderate ?? 0)")
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH"         >> "$GITHUB_OUTPUT"
          echo "moderate=$MODERATE" >> "$GITHUB_OUTPUT"

      - name: Run TypeScript check
        id: typecheck
        run: |
          npx tsc --noEmit 2>&1 | head -50 > /tmp/typecheck.txt || true
          ERRORS=$(grep -c "error TS" /tmp/typecheck.txt || true)
          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"

      - name: Collect codebase snapshot for audit
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const filesToRead = [
            "src/lib/auth.ts",
            "src/app/api/admin/login/route.ts",
            "src/app/api/checkout/create/route.ts",
            "src/app/api/checkout/pickup/route.ts",
            "src/app/api/checkout/paypal/create/route.ts",
            "src/app/api/checkout/paypal/capture/route.ts",
            "src/app/api/webhooks/stripe/route.ts",
            "src/lib/rate-limit.ts",
            "src/lib/image-upload.ts",
            "src/lib/invoice.ts",
            "src/actions/products.ts",
            "src/actions/orders.ts",
            "src/actions/import.ts",
            "src/lib/checkout.ts",
            "next.config.ts",
            ".github/workflows/ci.yml",
            ".github/workflows/deploy.yml",
            "db/schema.ts",
            ".env.example",
            "package.json",
          ];

          let snapshot = "";
          for (const filePath of filesToRead) {
            try {
              const content = fs.readFileSync(filePath, "utf8");
              snapshot += `\n\n### FILE: ${filePath}\n\`\`\`\n${content.substring(0, 6000)}\n\`\`\`\n`;
            } catch {
              snapshot += `\n\n### FILE: ${filePath}\n(not found or unreadable)\n`;
            }
          }

          // Also list all src files for dead code analysis
          function walk(dir, out = []) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory() && !entry.name.startsWith(".") && entry.name !== "node_modules") {
                walk(full, out);
              } else if (entry.isFile() && /\.(ts|tsx)$/.test(entry.name)) {
                out.push(full);
              }
            }
            return out;
          }
          const allFiles = walk("src");
          snapshot += `\n\n### ALL SOURCE FILES (${allFiles.length} total)\n${allFiles.join("\n")}\n`;

          fs.writeFileSync("/tmp/codebase-snapshot.txt", snapshot);
          console.log(`Snapshot written: ${snapshot.length} chars, ${allFiles.length} source files`);
          NODE

      - name: Run GitHub Models audit (free, no API key needed)
        id: ai_audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CRITICAL: ${{ steps.npm_audit.outputs.critical }}
          NPM_HIGH: ${{ steps.npm_audit.outputs.high }}
          NPM_MODERATE: ${{ steps.npm_audit.outputs.moderate }}
          TS_ERRORS: ${{ steps.typecheck.outputs.errors }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          (async () => {
          const snapshot = fs.readFileSync("/tmp/codebase-snapshot.txt", "utf8");
          const npmAudit = fs.readFileSync("/tmp/npm-audit.json", "utf8");
          const tsOutput = fs.existsSync("/tmp/typecheck.txt")
            ? fs.readFileSync("/tmp/typecheck.txt", "utf8")
            : "";

          const prompt = `You are a senior security engineer auditing the vinyl-marketplace-production Next.js e-commerce codebase.

          ## Context from automated checks
          - npm audit: ${process.env.NPM_CRITICAL} critical, ${process.env.NPM_HIGH} high, ${process.env.NPM_MODERATE} moderate vulnerabilities
          - TypeScript errors: ${process.env.TS_ERRORS}

          ## npm audit output (abbreviated)
          \`\`\`json
          ${npmAudit.substring(0, 3000)}
          \`\`\`

          ## TypeScript check output
          \`\`\`
          ${tsOutput.substring(0, 1000)}
          \`\`\`

          ## Codebase snapshot
          ${snapshot.substring(0, 40000)}

          ## Your task
          Perform a deep security and quality audit. Focus on:
          1. Security vulnerabilities (auth bypass, missing rate limits, input validation, secrets exposure, insecure cookies, header misconfiguration)
          2. Logic bugs that could affect payments, orders, or stock
          3. Dead or unused code
          4. Dependency vulnerabilities
          5. TypeScript/type safety issues
          6. Missing indexes or DB schema issues
          7. CI/CD pipeline security (least privilege, pinned actions)

          Return a JSON object with exactly these fields:
          {
            "severity_summary": "one-line overall risk level: CRITICAL/HIGH/MEDIUM/LOW",
            "top_findings": [
              {
                "id": "F1",
                "severity": "HIGH",
                "title": "short title",
                "file": "src/lib/auth.ts",
                "line": 42,
                "description": "what the issue is and why it matters",
                "recommendation": "specific fix with code example if possible"
              }
            ],
            "quick_wins": ["list of easy 1-line fixes"],
            "dependencies_at_risk": ["package@version — reason"],
            "no_issues_found": ["areas that look clean"],
            "priority_action": "the single most important thing to fix today"
          }

          Return ONLY the raw JSON, no markdown, no explanation.`;

          const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              model: "gpt-4o",
              messages: [{ role: "user", content: prompt }],
              response_format: { type: "json_object" },
              max_tokens: 4096,
              temperature: 0.2,
            }),
          });

          if (!response.ok) {
            const err = await response.text();
            throw new Error(`GitHub Models API error ${response.status}: ${err}`);
          }

          const data = await response.json();
          const text = data.choices?.[0]?.message?.content ?? "{}";

          let parsed;
          try {
            parsed = JSON.parse(text);
          } catch {
            parsed = {
              severity_summary: "UNKNOWN — parse error",
              top_findings: [],
              quick_wins: [],
              dependencies_at_risk: [],
              no_issues_found: [],
              priority_action: "Raw model output: " + text.substring(0, 500),
            };
          }

          fs.writeFileSync("/tmp/audit-result.json", JSON.stringify(parsed, null, 2));

          // Write GITHUB_OUTPUT
          const out = fs.createWriteStream(process.env.GITHUB_OUTPUT, { flags: "a" });
          const set = (k, v = "") => out.write(`${k}<<EOF\n${String(v)}\nEOF\n`);
          set("severity", parsed.severity_summary ?? "UNKNOWN");
          set("priority_action", parsed.priority_action ?? "");
          set("findings_count", String(parsed.top_findings?.length ?? 0));
          out.end();

          console.log("Severity:", parsed.severity_summary);
          console.log("Findings:", parsed.top_findings?.length ?? 0);
          })();
          NODE

      - name: Create findings issue
        uses: actions/github-script@v7
        env:
          AUDIT_RESULT_PATH: /tmp/audit-result.json
          SEVERITY: ${{ steps.ai_audit.outputs.severity }}
          PRIORITY: ${{ steps.ai_audit.outputs.priority_action }}
          FINDINGS_COUNT: ${{ steps.ai_audit.outputs.findings_count }}
          NPM_CRITICAL: ${{ steps.npm_audit.outputs.critical }}
          NPM_HIGH: ${{ steps.npm_audit.outputs.high }}
          TS_ERRORS: ${{ steps.typecheck.outputs.errors }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const result = JSON.parse(fs.readFileSync(process.env.AUDIT_RESULT_PATH, "utf8"));
            const today = new Date().toISOString().slice(0, 10);
            const severity = process.env.SEVERITY;

            // Check if an open issue for today already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "automated-audit",
              state: "open",
              per_page: 10,
            });
            const todayIssue = issues.data.find(i => i.title.includes(today));
            if (todayIssue) {
              console.log(`Issue already exists for today: #${todayIssue.number}`);
              return;
            }

            // Build issue body
            let body = `## Daily Security Audit — ${today}\n\n`;
            body += `| Check | Result |\n|---|---|\n`;
            body += `| Overall risk | **${severity}** |\n`;
            body += `| Findings | ${process.env.FINDINGS_COUNT} |\n`;
            body += `| npm critical CVEs | ${process.env.NPM_CRITICAL} |\n`;
            body += `| npm high CVEs | ${process.env.NPM_HIGH} |\n`;
            body += `| TypeScript errors | ${process.env.TS_ERRORS} |\n\n`;

            if (result.priority_action) {
              body += `### ⚡ Priority Action Today\n\n> ${result.priority_action}\n\n`;
            }

            if (result.top_findings?.length > 0) {
              body += `### Findings\n\n`;
              for (const f of result.top_findings) {
                body += `#### ${f.id} — \`${f.severity}\` — ${f.title}\n`;
                body += `**File:** \`${f.file ?? "unknown"}\`${f.line ? ` line ${f.line}` : ""}\n\n`;
                body += `${f.description}\n\n`;
                if (f.recommendation) {
                  body += `**Fix:** ${f.recommendation}\n\n`;
                }
                body += `---\n\n`;
              }
            }

            if (result.quick_wins?.length > 0) {
              body += `### Quick Wins\n\n`;
              for (const w of result.quick_wins) body += `- ${w}\n`;
              body += "\n";
            }

            if (result.dependencies_at_risk?.length > 0) {
              body += `### Dependencies at Risk\n\n`;
              for (const d of result.dependencies_at_risk) body += `- ${d}\n`;
              body += "\n";
            }

            if (result.no_issues_found?.length > 0) {
              body += `### Areas Looking Clean\n\n`;
              for (const c of result.no_issues_found) body += `- ✅ ${c}\n`;
              body += "\n";
            }

            body += `---\n*Automated audit powered by GitHub Models (gpt-4o) — free, no external API key required.*\n`;
            body += `*To apply fixes automatically, enable the Claude Code workflow and add \`ANTHROPIC_API_KEY\` secret.*`;

            const severityLabel =
              severity.includes("CRITICAL") ? "security:critical" :
              severity.includes("HIGH") ? "security:high" :
              severity.includes("MEDIUM") ? "security:medium" : "security:low";

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[audit] Daily security findings — ${today} — ${severity}`,
              body,
              labels: ["automated-audit", "security", severityLabel].filter(Boolean),
              assignees: ["F1846"],
            });

      - name: Write job summary
        if: always()
        env:
          SEVERITY: ${{ steps.ai_audit.outputs.severity }}
          PRIORITY: ${{ steps.ai_audit.outputs.priority_action }}
          FINDINGS_COUNT: ${{ steps.ai_audit.outputs.findings_count }}
          NPM_CRITICAL: ${{ steps.npm_audit.outputs.critical }}
          NPM_HIGH: ${{ steps.npm_audit.outputs.high }}
          TS_ERRORS: ${{ steps.typecheck.outputs.errors }}
        run: |
          {
            echo "## Daily Security Audit — $(date -u +%Y-%m-%d)"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Risk level | **${SEVERITY:-unknown}** |"
            echo "| AI findings | ${FINDINGS_COUNT:-0} |"
            echo "| npm critical | ${NPM_CRITICAL:-0} |"
            echo "| npm high | ${NPM_HIGH:-0} |"
            echo "| TS errors | ${TS_ERRORS:-0} |"
            echo ""
            echo "### Priority Action"
            echo "${PRIORITY:-none}"
            echo ""
            echo "*Powered by GitHub Models (gpt-4o) — free, no API key required*"
          } >> "$GITHUB_STEP_SUMMARY"
