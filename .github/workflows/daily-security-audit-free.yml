name: Daily Security Audit

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-security-audit-free
  cancel-in-progress: false

jobs:
  audit:
    name: Security Findings Report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        run: |
          npm audit --json > /tmp/npm-audit.json || true
          CRITICAL=$(node -e "const d=require('/tmp/npm-audit.json'); console.log(d.metadata?.vulnerabilities?.critical ?? 0)")
          HIGH=$(node -e "const d=require('/tmp/npm-audit.json'); console.log(d.metadata?.vulnerabilities?.high ?? 0)")
          MODERATE=$(node -e "const d=require('/tmp/npm-audit.json'); console.log(d.metadata?.vulnerabilities?.moderate ?? 0)")
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "moderate=$MODERATE" >> "$GITHUB_OUTPUT"

      - name: Run TypeScript check
        id: typecheck
        run: |
          npx tsc --noEmit 2>&1 | head -50 > /tmp/typecheck.txt || true
          ERRORS=$(grep -c "error TS" /tmp/typecheck.txt || true)
          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"

      - name: Static security scan
        id: static_scan
        run: |
          {
            echo "=== dangerouslySetInnerHTML ==="
            grep -rn "dangerouslySetInnerHTML" src/ | head -5 || echo "none"

            echo "=== eval() usage ==="
            grep -rn "\beval(" src/ | head -5 || echo "none"

            echo "=== hardcoded secrets ==="
            grep -rn -E "(password|secret|token|key)\s*=\s*['\"][^'\"]{8,}" src/ --include="*.ts" --include="*.tsx" | grep -v "placeholder\|example\|test\|spec\|hash\|\.env\|translation\|dict\|i18n" | head -5 || echo "none"

            echo "=== SQL string interpolation ==="
            grep -rn "sql\`.*\${" src/ | head -5 || echo "none"

            echo "=== console.log ==="
            grep -rn "console\.log" src/ | grep -v "\.test\." | head -5 || echo "none"

            echo "=== TODO/FIXME ==="
            grep -rn "TODO\|FIXME" src/ | head -5 || echo "none"

            echo "=== missing auth guard ==="
            grep -rL "requireAuthenticatedAdmin" src/actions/*.ts 2>/dev/null | head -5 || echo "all guarded"

            echo "=== process.env no fallback ==="
            grep -rn "process\.env\." src/app/api/ | grep -v "??\|||" | head -5 || echo "none"

            echo "=== any cast ==="
            grep -rn " as any\b" src/ | grep -v "\.test\." | head -5 || echo "none"

            echo "=== npm audit ==="
            node -e "const v=require('/tmp/npm-audit.json').metadata?.vulnerabilities??{}; console.log('critical:'+v.critical+' high:'+v.high+' moderate:'+v.moderate)"
          } > /tmp/static-findings.txt 2>&1
          cat /tmp/static-findings.txt
          FINDINGS=$(wc -l < /tmp/static-findings.txt)
          echo "lines=$FINDINGS" >> "$GITHUB_OUTPUT"

      - name: Build local audit report
        id: local_audit
        env:
          NPM_CRITICAL: ${{ steps.npm_audit.outputs.critical }}
          NPM_HIGH: ${{ steps.npm_audit.outputs.high }}
          NPM_MODERATE: ${{ steps.npm_audit.outputs.moderate }}
          TS_ERRORS: ${{ steps.typecheck.outputs.errors }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          const staticFindings = fs.readFileSync("/tmp/static-findings.txt", "utf8");
          const npmAudit = JSON.parse(fs.readFileSync("/tmp/npm-audit.json", "utf8"));
          const vulnerabilities = npmAudit.metadata?.vulnerabilities ?? {};
          const topFindings = [];

          if ((vulnerabilities.critical ?? 0) > 0) {
            topFindings.push({
              id: "F1",
              severity: "CRITICAL",
              title: "Critical npm vulnerabilities detected",
              file: "package-lock.json",
              description: `npm audit reported ${vulnerabilities.critical} critical vulnerabilities in production dependencies.`,
              recommendation: "Review the npm audit output, update the affected packages, and rerun the audit.",
            });
          }

          if ((vulnerabilities.high ?? 0) > 0) {
            topFindings.push({
              id: `F${topFindings.length + 1}`,
              severity: "HIGH",
              title: "High-severity npm vulnerabilities detected",
              file: "package-lock.json",
              description: `npm audit reported ${vulnerabilities.high} high-severity vulnerabilities in production dependencies.`,
              recommendation: "Upgrade or replace the affected packages and rerun the audit.",
            });
          }

          if (Number(process.env.TS_ERRORS ?? 0) > 0) {
            topFindings.push({
              id: `F${topFindings.length + 1}`,
              severity: "MEDIUM",
              title: "TypeScript errors detected",
              file: "src/",
              description: `TypeScript reported ${process.env.TS_ERRORS} errors during the audit run.`,
              recommendation: "Fix the reported type errors so the audit runs against a healthy build.",
            });
          }

          if ((staticFindings.match(/dangerouslySetInnerHTML/g) ?? []).length > 0) {
            topFindings.push({
              id: `F${topFindings.length + 1}`,
              severity: "MEDIUM",
              title: "dangerouslySetInnerHTML usage present",
              file: "src/",
              description: "Static scanning found dangerouslySetInnerHTML usages that should be reviewed for safe serialization.",
              recommendation: "Verify that each usage escapes dynamic content and only renders trusted data.",
            });
          }

          const severitySummary =
            (vulnerabilities.critical ?? 0) > 0
              ? "CRITICAL - critical dependency vulnerabilities were detected."
              : (vulnerabilities.high ?? 0) > 0
                ? "HIGH - high-severity dependency vulnerabilities were detected."
                : Number(process.env.TS_ERRORS ?? 0) > 0 || topFindings.length > 0
                  ? "MEDIUM - review the reported findings and fix the highlighted risks."
                  : "LOW - no major security issues were detected in this automated pass.";

          const report = {
            severity_summary: severitySummary,
            top_findings: topFindings,
            quick_wins: [
              "Review the workflow log snippets for the exact files flagged by the static scan.",
              "Rerun npm audit after dependency upgrades.",
              "Keep admin and API routes behind auth and rate limiting.",
            ],
            dependencies_at_risk: Object.entries(npmAudit.vulnerabilities ?? {})
              .slice(0, 5)
              .map(([name, details]) => `${name}: ${details.severity}`),
            no_issues_found:
              topFindings.length === 0
                ? [
                    "No critical or high production dependency vulnerabilities were detected.",
                    "The static audit completed without a blocking finding.",
                  ]
                : [],
            priority_action:
              topFindings[0]?.recommendation ??
              "Review the audit output and address any newly introduced risks.",
          };

          fs.writeFileSync("/tmp/audit-result.json", JSON.stringify(report, null, 2));

          const out = fs.createWriteStream(process.env.GITHUB_OUTPUT, { flags: "a" });
          const set = (key, value = "") => out.write(`${key}<<EOF\n${String(value)}\nEOF\n`);
          set("severity", report.severity_summary);
          set("priority_action", report.priority_action);
          set("findings_count", String(report.top_findings.length));
          out.end();
          NODE

      - name: Create findings issue
        uses: actions/github-script@v7
        env:
          AUDIT_RESULT_PATH: /tmp/audit-result.json
          SEVERITY: ${{ steps.local_audit.outputs.severity }}
          PRIORITY: ${{ steps.local_audit.outputs.priority_action }}
          FINDINGS_COUNT: ${{ steps.local_audit.outputs.findings_count }}
          NPM_CRITICAL: ${{ steps.npm_audit.outputs.critical }}
          NPM_HIGH: ${{ steps.npm_audit.outputs.high }}
          TS_ERRORS: ${{ steps.typecheck.outputs.errors }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const result = JSON.parse(fs.readFileSync(process.env.AUDIT_RESULT_PATH, "utf8"));
            const today = new Date().toISOString().slice(0, 10);
            const severity = process.env.SEVERITY;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "automated-audit",
              state: "open",
              per_page: 10,
            });

            const todayIssue = issues.data.find((issue) => issue.title.includes(today));
            if (todayIssue) {
              console.log(`Issue already exists for today: #${todayIssue.number}`);
              return;
            }

            let body = `## Daily Security Audit - ${today}\n\n`;
            body += `| Check | Result |\n|---|---|\n`;
            body += `| Overall risk | **${severity}** |\n`;
            body += `| Findings | ${process.env.FINDINGS_COUNT} |\n`;
            body += `| npm critical CVEs | ${process.env.NPM_CRITICAL} |\n`;
            body += `| npm high CVEs | ${process.env.NPM_HIGH} |\n`;
            body += `| TypeScript errors | ${process.env.TS_ERRORS} |\n\n`;

            if (result.priority_action) {
              body += `### Priority Action Today\n\n> ${result.priority_action}\n\n`;
            }

            if (result.top_findings?.length > 0) {
              body += "### Findings\n\n";
              for (const finding of result.top_findings) {
                body += `#### ${finding.id} - \`${finding.severity}\` - ${finding.title}\n`;
                body += `**File:** \`${finding.file ?? "unknown"}\`\n\n`;
                body += `${finding.description}\n\n`;
                if (finding.recommendation) {
                  body += `**Fix:** ${finding.recommendation}\n\n`;
                }
                body += "---\n\n";
              }
            }

            if (result.quick_wins?.length > 0) {
              body += "### Quick Wins\n\n";
              for (const item of result.quick_wins) body += `- ${item}\n`;
              body += "\n";
            }

            if (result.dependencies_at_risk?.length > 0) {
              body += "### Dependencies at Risk\n\n";
              for (const item of result.dependencies_at_risk) body += `- ${item}\n`;
              body += "\n";
            }

            if (result.no_issues_found?.length > 0) {
              body += "### Areas Looking Clean\n\n";
              for (const item of result.no_issues_found) body += `- ${item}\n`;
              body += "\n";
            }

            body += "---\n";
            body += "*Automated audit report generated from npm audit, TypeScript, and static security scans.*\n";

            const severityLabel =
              severity.includes("CRITICAL")
                ? "security:critical"
                : severity.includes("HIGH")
                  ? "security:high"
                  : severity.includes("MEDIUM")
                    ? "security:medium"
                    : "security:low";

            const existingLabels = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            const existingLabelNames = new Set(existingLabels.map((label) => label.name));
            const labels = ["automated-audit", "security", severityLabel].filter((label) =>
              existingLabelNames.has(label)
            );

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[audit] Daily security findings - ${today} - ${severity}`,
              body,
              labels,
            });

      - name: Write job summary
        if: always()
        env:
          SEVERITY: ${{ steps.local_audit.outputs.severity }}
          PRIORITY: ${{ steps.local_audit.outputs.priority_action }}
          FINDINGS_COUNT: ${{ steps.local_audit.outputs.findings_count }}
          NPM_CRITICAL: ${{ steps.npm_audit.outputs.critical }}
          NPM_HIGH: ${{ steps.npm_audit.outputs.high }}
          TS_ERRORS: ${{ steps.typecheck.outputs.errors }}
        run: |
          {
            echo "## Daily Security Audit - $(date -u +%Y-%m-%d)"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Risk level | **${SEVERITY:-unknown}** |"
            echo "| Findings | ${FINDINGS_COUNT:-0} |"
            echo "| npm critical | ${NPM_CRITICAL:-0} |"
            echo "| npm high | ${NPM_HIGH:-0} |"
            echo "| TS errors | ${TS_ERRORS:-0} |"
            echo ""
            echo "### Priority Action"
            echo "${PRIORITY:-none}"
          } >> "$GITHUB_STEP_SUMMARY"
