name: Daily Security Audit

on:
  schedule:
    - cron: "0 9 * * *"   # Every day at 09:00 UTC
  workflow_dispatch:

# Uses GITHUB_TOKEN only — no extra API key or cost required.
# GitHub Models (gpt-4o) is free for GitHub Actions workflows.
permissions:
  contents: read
  issues: write
  models: read

concurrency:
  group: daily-security-audit-free
  cancel-in-progress: false

jobs:
  audit:
    name: Security Findings Report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        run: |
          npm audit --json > /tmp/npm-audit.json || true
          CRITICAL=$(node -e "const d=require('/tmp/npm-audit.json'); console.log(d.metadata?.vulnerabilities?.critical ?? 0)")
          HIGH=$(node -e "const d=require('/tmp/npm-audit.json'); console.log(d.metadata?.vulnerabilities?.high ?? 0)")
          MODERATE=$(node -e "const d=require('/tmp/npm-audit.json'); console.log(d.metadata?.vulnerabilities?.moderate ?? 0)")
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH"         >> "$GITHUB_OUTPUT"
          echo "moderate=$MODERATE" >> "$GITHUB_OUTPUT"

      - name: Run TypeScript check
        id: typecheck
        run: |
          npx tsc --noEmit 2>&1 | head -50 > /tmp/typecheck.txt || true
          ERRORS=$(grep -c "error TS" /tmp/typecheck.txt || true)
          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"

      # Static analysis: grep for security anti-patterns before calling AI
      # This keeps the AI payload tiny and stays within the free token limit.
      - name: Static security scan
        id: static_scan
        run: |
          {
            echo "=== dangerouslySetInnerHTML ==="
            grep -rn "dangerouslySetInnerHTML" src/ | head -5 || echo "none"

            echo "=== eval() usage ==="
            grep -rn "\beval(" src/ | head -5 || echo "none"

            echo "=== hardcoded secrets ==="
            grep -rn -E "(password|secret|token|key)\s*=\s*['\"][^'\"]{8,}" src/ --include="*.ts" --include="*.tsx" | grep -v "placeholder\|example\|test\|spec\|hash\|\.env\|translation\|dict\|i18n" | head -5 || echo "none"

            echo "=== SQL string interpolation ==="
            grep -rn "sql\`.*\${" src/ | head -5 || echo "none"

            echo "=== console.log ==="
            grep -rn "console\.log" src/ | grep -v "\.test\." | head -5 || echo "none"

            echo "=== TODO/FIXME ==="
            grep -rn "TODO\|FIXME" src/ | head -5 || echo "none"

            echo "=== missing auth guard ==="
            grep -rL "requireAuthenticatedAdmin" src/actions/*.ts 2>/dev/null | head -5 || echo "all guarded"

            echo "=== process.env no fallback ==="
            grep -rn "process\.env\." src/app/api/ | grep -v "??\|||" | head -5 || echo "none"

            echo "=== any cast ==="
            grep -rn " as any\b" src/ | grep -v "\.test\." | head -5 || echo "none"

            echo "=== npm audit ==="
            node -e "const v=require('/tmp/npm-audit.json').metadata?.vulnerabilities??{}; console.log('critical:'+v.critical+' high:'+v.high+' moderate:'+v.moderate)"

          } > /tmp/static-findings.txt 2>&1
          cat /tmp/static-findings.txt
          FINDINGS=$(wc -l < /tmp/static-findings.txt)
          echo "lines=$FINDINGS" >> "$GITHUB_OUTPUT"

      - name: Run GitHub Models audit (free, no API key needed)
        id: ai_audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CRITICAL: ${{ steps.npm_audit.outputs.critical }}
          NPM_HIGH: ${{ steps.npm_audit.outputs.high }}
          NPM_MODERATE: ${{ steps.npm_audit.outputs.moderate }}
          TS_ERRORS: ${{ steps.typecheck.outputs.errors }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          (async () => {
          // Use targeted static findings instead of full source — stays under token limit
          const staticFindings = fs.readFileSync("/tmp/static-findings.txt", "utf8");
          const npmAudit = JSON.parse(fs.readFileSync("/tmp/npm-audit.json", "utf8"));
          const vulns = npmAudit.metadata?.vulnerabilities ?? {};
          const advisories = Object.values(npmAudit.vulnerabilities ?? {})
            .slice(0, 3)
            .map(v => `${v.name}: ${v.severity}`)
            .join(", ");

          const findings = staticFindings.substring(0, 1200);

          const prompt = [
            "Security audit of vinyl-marketplace-production (Next.js, Stripe, PostgreSQL/Drizzle).",
            "",
            "Scan: npm critical=" + process.env.NPM_CRITICAL + " high=" + process.env.NPM_HIGH + " moderate=" + process.env.NPM_MODERATE + ", TS errors=" + process.env.TS_ERRORS,
            "Packages: " + (advisories || "none"),
            "Static findings:",
            findings,
            "",
            'Return ONLY this JSON: {"severity_summary":"CRITICAL/HIGH/MEDIUM/LOW - one sentence","top_findings":[{"id":"F1","severity":"HIGH","title":"..","file":"..","description":"..","recommendation":".."}],"quick_wins":[".."],"dependencies_at_risk":[".."],"no_issues_found":[".."],"priority_action":".."}',
          ].join("\n");

          const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              model: "gpt-4o",
              messages: [{ role: "user", content: prompt }],
              response_format: { type: "json_object" },
              max_tokens: 800,
              temperature: 0.2,
            }),
          });

          if (!response.ok) {
            const err = await response.text();
            throw new Error(`GitHub Models API error ${response.status}: ${err}`);
          }

          const data = await response.json();
          const text = data.choices?.[0]?.message?.content ?? "{}";

          let parsed;
          try {
            parsed = JSON.parse(text);
          } catch {
            parsed = {
              severity_summary: "UNKNOWN - parse error",
              top_findings: [],
              quick_wins: [],
              dependencies_at_risk: [],
              no_issues_found: [],
              priority_action: "Raw model output: " + text.substring(0, 500),
            };
          }

          fs.writeFileSync("/tmp/audit-result.json", JSON.stringify(parsed, null, 2));

          // Write GITHUB_OUTPUT
          const out = fs.createWriteStream(process.env.GITHUB_OUTPUT, { flags: "a" });
          const set = (k, v = "") => out.write(`${k}<<EOF\n${String(v)}\nEOF\n`);
          set("severity", parsed.severity_summary ?? "UNKNOWN");
          set("priority_action", parsed.priority_action ?? "");
          set("findings_count", String(parsed.top_findings?.length ?? 0));
          out.end();

          console.log("Severity:", parsed.severity_summary);
          console.log("Findings:", parsed.top_findings?.length ?? 0);
          })();
          NODE

      - name: Create findings issue
        uses: actions/github-script@v7
        env:
          AUDIT_RESULT_PATH: /tmp/audit-result.json
          SEVERITY: ${{ steps.ai_audit.outputs.severity }}
          PRIORITY: ${{ steps.ai_audit.outputs.priority_action }}
          FINDINGS_COUNT: ${{ steps.ai_audit.outputs.findings_count }}
          NPM_CRITICAL: ${{ steps.npm_audit.outputs.critical }}
          NPM_HIGH: ${{ steps.npm_audit.outputs.high }}
          TS_ERRORS: ${{ steps.typecheck.outputs.errors }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const result = JSON.parse(fs.readFileSync(process.env.AUDIT_RESULT_PATH, "utf8"));
            const today = new Date().toISOString().slice(0, 10);
            const severity = process.env.SEVERITY;

            // Check if an open issue for today already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "automated-audit",
              state: "open",
              per_page: 10,
            });
            const todayIssue = issues.data.find(i => i.title.includes(today));
            if (todayIssue) {
              console.log(`Issue already exists for today: #${todayIssue.number}`);
              return;
            }

            // Build issue body
            let body = `## Daily Security Audit — ${today}\n\n`;
            body += `| Check | Result |\n|---|---|\n`;
            body += `| Overall risk | **${severity}** |\n`;
            body += `| Findings | ${process.env.FINDINGS_COUNT} |\n`;
            body += `| npm critical CVEs | ${process.env.NPM_CRITICAL} |\n`;
            body += `| npm high CVEs | ${process.env.NPM_HIGH} |\n`;
            body += `| TypeScript errors | ${process.env.TS_ERRORS} |\n\n`;

            if (result.priority_action) {
              body += `### ⚡ Priority Action Today\n\n> ${result.priority_action}\n\n`;
            }

            if (result.top_findings?.length > 0) {
              body += `### Findings\n\n`;
              for (const f of result.top_findings) {
                body += `#### ${f.id} — \`${f.severity}\` — ${f.title}\n`;
                body += `**File:** \`${f.file ?? "unknown"}\`${f.line ? ` line ${f.line}` : ""}\n\n`;
                body += `${f.description}\n\n`;
                if (f.recommendation) {
                  body += `**Fix:** ${f.recommendation}\n\n`;
                }
                body += `---\n\n`;
              }
            }

            if (result.quick_wins?.length > 0) {
              body += `### Quick Wins\n\n`;
              for (const w of result.quick_wins) body += `- ${w}\n`;
              body += "\n";
            }

            if (result.dependencies_at_risk?.length > 0) {
              body += `### Dependencies at Risk\n\n`;
              for (const d of result.dependencies_at_risk) body += `- ${d}\n`;
              body += "\n";
            }

            if (result.no_issues_found?.length > 0) {
              body += `### Areas Looking Clean\n\n`;
              for (const c of result.no_issues_found) body += `- ✅ ${c}\n`;
              body += "\n";
            }

            body += `---\n*Automated audit powered by GitHub Models (gpt-4o) — free, no external API key required.*\n`;
            body += `*To apply fixes automatically, enable the Claude Code workflow and add \`ANTHROPIC_API_KEY\` secret.*`;

            const severityLabel =
              severity.includes("CRITICAL") ? "security:critical" :
              severity.includes("HIGH") ? "security:high" :
              severity.includes("MEDIUM") ? "security:medium" : "security:low";

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[audit] Daily security findings — ${today} — ${severity}`,
              body,
              labels: ["automated-audit", "security", severityLabel].filter(Boolean),
              assignees: ["F1846"],
            });

      - name: Write job summary
        if: always()
        env:
          SEVERITY: ${{ steps.ai_audit.outputs.severity }}
          PRIORITY: ${{ steps.ai_audit.outputs.priority_action }}
          FINDINGS_COUNT: ${{ steps.ai_audit.outputs.findings_count }}
          NPM_CRITICAL: ${{ steps.npm_audit.outputs.critical }}
          NPM_HIGH: ${{ steps.npm_audit.outputs.high }}
          TS_ERRORS: ${{ steps.typecheck.outputs.errors }}
        run: |
          {
            echo "## Daily Security Audit — $(date -u +%Y-%m-%d)"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Risk level | **${SEVERITY:-unknown}** |"
            echo "| AI findings | ${FINDINGS_COUNT:-0} |"
            echo "| npm critical | ${NPM_CRITICAL:-0} |"
            echo "| npm high | ${NPM_HIGH:-0} |"
            echo "| TS errors | ${TS_ERRORS:-0} |"
            echo ""
            echo "### Priority Action"
            echo "${PRIORITY:-none}"
            echo ""
            echo "*Powered by GitHub Models (gpt-4o) — free, no API key required*"
          } >> "$GITHUB_STEP_SUMMARY"
